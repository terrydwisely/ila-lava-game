// Particles
function spawnParts(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    parts.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * -7 - 1,
      life: 1,
      col,
      r: 3 + Math.random() * 5,
    });
  }
}
function tickParts(dt) {
  parts = parts.filter(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.25;
    p.life -= dt * 2;
    return p.life > 0;
  });
}
function drawParts() {
  parts.forEach(p => {
    X.save();
    X.globalAlpha = p.life;
    X.fillStyle = p.col;
    X.beginPath();
    X.arc(p.x, p.y, Math.max(0.1, p.r * p.life), 0, Math.PI * 2);
    X.fill();
    X.restore();
  });
}

function rrect(x, y, w, h, r) {
  X.beginPath();
  X.moveTo(x + r, y);
  X.lineTo(x + w - r, y);
  X.arcTo(x + w, y, x + w, y + r, r);
  X.lineTo(x + w, y + h - r);
  X.arcTo(x + w, y + h, x + w - r, y + h, r);
  X.lineTo(x + r, y + h);
  X.arcTo(x, y + h, x, y + h - r, r);
  X.lineTo(x, y + r);
  X.arcTo(x, y, x + r, y, r);
  X.closePath();
}

function bgJungle(wx) {
  var sg = X.createLinearGradient(0,0,0,GH*0.7);
  sg.addColorStop(0,'#4DD0E1'); sg.addColorStop(1,'#C5E1A5');

  // Sun

  X.fillStyle='#FFF176'; X.beginPath(); X.arc(GW*0.78,GH*0.12,24,0,Math.PI*2); X.fill();
  // Clouds
  function cloud(cx,cy,s){
    X.fillStyle='rgba(255,255,255,0.9)';
    [[0,0,28],[-22,8,20],[22,8,20],[0,14,24]].forEach(function(d){
      X.beginPath(); X.arc(cx+d[0]*s,cy+d[1]*s,d[2]*s,0,Math.PI*2); X.fill();
    });
  }
  var co=(wx*0.25)%(GW+120);
  cloud(((160-co+GW+120)%(GW+120)),55,1);
  cloud(((340-co*0.7+GW+120)%(GW+120)),78,0.8);
  cloud(((520-co*0.5+GW+120)%(GW+120)),48,1.1);
  // Hills
  X.fillStyle='#81C784';
  X.beginPath(); X.moveTo(0,GH*0.52);
  for(var i=0;i<=GW;i+=3) X.lineTo(i,GH*0.52-Math.abs(Math.sin((i+wx*0.12)*0.006))*55);
  X.lineTo(GW,GH*0.65); X.lineTo(0,GH*0.65); X.closePath(); X.fill();
  // Trees
  for(var t=0;t<9;t++){
    var tx=((t*140+60-wx*0.4)%(GW+150)+GW+150)%(GW+150)-70;
    drawTree(tx,GH*0.6,90+Math.sin(t*5)*25);
  }
  // Treehouse landmark
  var thSx=650-wx;
  if(thSx>-200&&thSx<GW+100) drawTreehouse(thSx+40,GH*0.47);
}

function drawTree(x,y,h){
  X.fillStyle='#6D4C41'; X.fillRect(x-5,y-h,10,h);
  X.fillStyle='#388E3C'; X.beginPath(); X.arc(x,y-h,32,0,Math.PI*2); X.fill();
  X.fillStyle='#2E7D32'; X.beginPath(); X.arc(x,y-h-20,24,0,Math.PI*2); X.fill();
}

function drawTreehouse(x,y){
  X.fillStyle='#5D4037'; X.fillRect(x-7,y,14,120);
  X.fillStyle='#2E7D32'; X.beginPath(); X.arc(x,y-10,52,0,Math.PI*2); X.fill();
  X.fillStyle='#8D6E63'; X.fillRect(x-38,y+20,76,10);
  X.fillStyle='#A1887F'; X.fillRect(x-30,y+10,60,42);
  X.fillStyle='#6D4C41';
  X.beginPath(); X.moveTo(x-38,y+10); X.lineTo(x,y-22); X.lineTo(x+38,y+10); X.closePath(); X.fill();
  X.fillStyle='#FFF59D'; X.fillRect(x-11,y+20,22,18);
  X.strokeStyle='#6D4C41'; X.lineWidth=2; X.strokeRect(x-11,y+20,22,18);
  X.beginPath(); X.moveTo(x,y+20); X.lineTo(x,y+38); X.stroke();
  X.beginPath(); X.moveTo(x-11,y+29); X.lineTo(x+11,y+29); X.stroke();
  // Ladder
  X.strokeStyle='#8D6E63'; X.lineWidth=3;
  X.beginPath(); X.moveTo(x+40,y+30); X.lineTo(x+40,y+130); X.stroke();
  X.beginPath(); X.moveTo(x+54,y+30); X.lineTo(x+54,y+130); X.stroke();
  for(var r=0;r<6;r++){
    X.beginPath(); X.moveTo(x+40,y+40+r*17); X.lineTo(x+54,y+40+r*17); X.stroke();
  }
}

function drawPalmSilhouette(x,y,col){
  X.strokeStyle=col; X.lineWidth=8;
  X.beginPath(); X.moveTo(x,y);
  X.bezierCurveTo(x-5,y-50,x+10,y-90,x,y-120); X.stroke();
  var fronds=[[-1.4,40],[-0.8,55],[0,60],[0.8,55],[1.4,40]];
  fronds.forEach(function(f){
    X.lineWidth=4; X.beginPath(); X.moveTo(x,y-120);
    X.lineTo(x+Math.cos(f[0]-Math.PI/2)*f[1],y-120+Math.sin(f[0]-Math.PI/2)*f[1]); X.stroke();
  });
}

  // Sandcastle at goal
  var scSx=curLvl.goalX-150-wx;
  if(scSx>-200&&scSx<GW+100) drawSandcastle(scSx,FLOOR-2);
  // Palms
  for(var p=0;p<5;p++){
    var ppx=((p*230+80-wx*0.48)%(GW+290)+GW+290)%(GW+290)-145;
    if(ppx>-100&&ppx<GW+80) drawPalm(ppx,FLOOR,p);
  }
}

function drawPalm(x,y,seed){
  var lean=Math.sin(seed*2.3)*0.18;
  X.save(); X.translate(x,y);
  X.fillStyle='#8D6E63';
  X.save(); X.rotate(lean);
  X.fillRect(-6,-110,12,110);
  var frondCols=['#388E3C','#43A047','#2E7D32'];
  for(var f=0;f<7;f++){
    var ang=(f/7)*Math.PI*2+lean;
    var sway=Math.sin(frame*0.02+f+seed)*0.06;
    X.strokeStyle=frondCols[f%3]; X.lineWidth=3;
    X.beginPath(); X.moveTo(0,-110);
    X.bezierCurveTo(
      Math.cos(ang+sway)*22,-110+Math.sin(ang+sway)*18,
      Math.cos(ang+sway)*58,-110+Math.sin(ang+sway)*42,
      Math.cos(ang+sway)*78,-110+Math.sin(ang+sway)*56
    ); X.stroke();
    X.fillStyle=frondCols[f%3];
    X.beginPath(); X.ellipse(Math.cos(ang+sway)*55,-110+Math.sin(ang+sway)*44,16,6,ang+sway+Math.PI/2,0,Math.PI*2); X.fill();
  }
  X.restore(); X.restore();
}

function drawSandcastle(x,y){
  X.fillStyle='#F9A825';
  X.fillRect(x-42,y-88,84,88);
  var towers=[x-55,x+55-32];
  towers.forEach(function(tx){
    X.fillRect(tx,y-105,32,105);
    for(var b=0;b<3;b++) X.fillRect(tx+b*11,y-118,8,13);
  });
  for(var b=0;b<4;b++) X.fillRect(x-42+b*21,y-105,14,17);
  X.fillStyle='#E53935'; X.fillRect(x,y-130,3,30);
  X.beginPath(); X.moveTo(x+3,y-130); X.lineTo(x+26,y-119); X.lineTo(x+3,y-108); X.closePath(); X.fill();
  X.fillStyle='#5D4037';
  X.beginPath(); X.arc(x,y-22,16,Math.PI,0); X.fill();
  X.fillRect(x-16,y-22,32,22); X.fill();
  X.beginPath(); X.arc(x-22,y-60,9,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(x+22,y-60,9,0,Math.PI*2); X.fill();
}

// ════════════════════════════════════════════════════
//  ILA CHARACTER
// ════════════════════════════════════════════════════
function drawIla(sx,sy,onGround,legPhase,invT){
  if(invT>0 && Math.floor(invT*10)%2===0) return;
  var x=sx+17, yFeet=sy;
  X.save(); X.translate(x,yFeet);
  // Back leg
  var legB=onGround?Math.sin(legPhase)*22:18;
  X.save(); X.translate(5,-14); X.rotate(legB*Math.PI/180);
  X.fillStyle='#FFCC80'; X.fillRect(-4,0,8,24);
  X.fillStyle='#FF3D00'; X.beginPath(); X.ellipse(0,26,9,5,0,0,Math.PI*2); X.fill(); X.restore();
  // Body
  X.fillStyle='#FF80AB';
  X.beginPath(); X.moveTo(-11,-56); X.lineTo(-15,-14); X.lineTo(15,-14); X.lineTo(11,-56); X.closePath(); X.fill();
  X.fillStyle='#FF4081';
  X.beginPath(); X.moveTo(-15,-22); X.lineTo(-15,-14); X.lineTo(15,-14); X.lineTo(15,-22); X.closePath(); X.fill();
  X.fillStyle='rgba(255,255,255,0.25)';
  X.beginPath(); X.moveTo(-4,-56); X.lineTo(-6,-20); X.lineTo(0,-20); X.lineTo(2,-56); X.closePath(); X.fill();
  // Front leg
  var legF=onGround?-Math.sin(legPhase)*22:-18;
  X.save(); X.translate(-5,-14); X.rotate(legF*Math.PI/180);
  X.fillStyle='#FFCC80'; X.fillRect(-4,0,8,24);
  X.fillStyle='#FF3D00'; X.beginPath(); X.ellipse(0,26,9,5,0,0,Math.PI*2); X.fill(); X.restore();
  // Back arm
  var armSw=onGround?Math.sin(legPhase+Math.PI)*14:-22;
  X.save(); X.translate(9,-50); X.rotate(armSw*Math.PI/180);
  X.fillStyle='#FFCC80'; X.fillRect(-4,0,8,20); X.restore();
  // Neck
  X.fillStyle='#FFCC80'; X.fillRect(-4,-66,8,12);
  // Head
  var headBob=onGround?Math.abs(Math.sin(legPhase))*2.5:0;
  X.save(); X.translate(0,-headBob);
  X.fillStyle='#FFCC80'; X.beginPath(); X.arc(0,-80,19,0,Math.PI*2); X.fill();
  // Blush
  X.fillStyle='rgba(255,100,100,0.38)';
  X.beginPath(); X.ellipse(-10,-76,6,4,0,0,Math.PI*2); X.fill();
  X.beginPath(); X.ellipse(10,-76,6,4,0,0,Math.PI*2); X.fill();
  // Hair
  X.fillStyle='#FFD740';
  X.beginPath(); X.arc(0,-86,20,Math.PI,Math.PI*2); X.fill();
  X.beginPath(); X.arc(-15,-76,9,Math.PI*0.45,Math.PI*1.55); X.fill();
  X.beginPath(); X.arc(15,-76,9,-Math.PI*0.55,Math.PI*0.55); X.fill();
  // Pigtails
  var pg=onGround?Math.sin(legPhase+Math.PI)*6:0;
  X.save(); X.translate(-24,-72+pg);
  X.beginPath(); X.arc(0,0,8,0,Math.PI*2); X.fillStyle='#FFD740'; X.fill(); X.restore();
  X.save(); X.translate(24,-72-pg);
  X.beginPath(); X.arc(0,0,8,0,Math.PI*2); X.fillStyle='#FFD740'; X.fill(); X.restore();
  // Eyes
  X.fillStyle='#4A2900';
  X.beginPath(); X.ellipse(-6,-82,3.5,4,0,0,Math.PI*2); X.fill();
  X.beginPath(); X.ellipse(6,-82,3.5,4,0,0,Math.PI*2); X.fill();
  X.fillStyle='white';
  X.beginPath(); X.arc(-5,-84,1.3,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(7,-84,1.3,0,Math.PI*2); X.fill();
  // Smile
  X.strokeStyle='#C66000'; X.lineWidth=1.8;
  X.beginPath(); X.arc(0,-76,6,0.25,Math.PI-0.25); X.stroke();
  X.restore(); // head
  // Front arm
  var armF=onGround?-Math.sin(legPhase+Math.PI)*14:22;
  X.save(); X.translate(-9,-50); X.rotate(armF*Math.PI/180);
  X.fillStyle='#FFCC80'; X.fillRect(-4,0,8,20); X.restore();
  X.restore(); // main
}

// ════════════════════════════════════════════════════
//  PLATFORM DRAW
// ════════════════════════════════════════════════════
function drawPlat(p){
  var sx=p.wx-worldX;
  if(sx+p.w<0||sx>GW) return;
  switch(p.type){
    case 'wood': {
      var g=X.createLinearGradient(sx,p.y,sx,p.y+p.h);
      g.addColorStop(0,'#A1887F'); g.addColorStop(1,'#6D4C41');
      X.fillStyle=g; rrect(sx,p.y,p.w,p.h,5); X.fill();
      X.strokeStyle='#4E342E'; X.lineWidth=2; X.stroke();
      X.strokeStyle='rgba(0,0,0,0.12)'; X.lineWidth=1;
      for(var i=10;i<p.w;i+=18){ X.beginPath(); X.moveTo(sx+i,p.y+3); X.lineTo(sx+i,p.y+p.h-3); X.stroke(); }
      break;
    }
    case 'leaf': {
      X.fillStyle='#4CAF50'; rrect(sx,p.y,p.w,p.h,8); X.fill();
      X.fillStyle='#388E3C'; rrect(sx,p.y,p.w,6,5); X.fill();
      break;
    }
    case 'stone': {
      X.fillStyle='#78909C'; rrect(sx,p.y,p.w,p.h,3); X.fill();
      X.strokeStyle='#546E7A'; X.lineWidth=2; X.stroke();
      break;
    }
    case 'bounce': {
      var pulse=1+Math.sin(frame*0.18)*0.04;
      X.save(); X.translate(sx+p.w/2,p.y+p.h/2); X.scale(1,pulse); X.translate(-(sx+p.w/2),-(p.y+p.h/2));
      X.fillStyle='#FFCA28'; rrect(sx,p.y,p.w,p.h,7); X.fill();
      X.fillStyle='#FF8F00'; rrect(sx,p.y,p.w,5,5); X.fill();
      X.restore();
      X.font='11px Arial'; X.textAlign='center';
      X.fillText('✨',sx+p.w/2,p.y+12);
      break;
    }
    case 'clr': {
      var clrs=['#EF5350','#42A5F5','#66BB6A','#FFA726','#AB47BC','#26C6DA'];
      X.fillStyle=clrs[Math.floor(p.wx/100)%6]; rrect(sx,p.y,p.w,p.h,6); X.fill();
      X.strokeStyle='rgba(255,255,255,0.55)'; X.lineWidth=2; X.stroke();
      break;
    }
    case 'sand': {
      var g2=X.createLinearGradient(sx,p.y,sx,p.y+p.h);
      g2.addColorStop(0,'#FFD54F'); g2.addColorStop(1,'#F9A825');
      X.fillStyle=g2; rrect(sx,p.y,p.w,p.h,6); X.fill();
      X.fillStyle='#F57F17'; rrect(sx,p.y,p.w,5,4); X.fill();
      break;
    }
  }
}

// ════════════════════════════════════════════════════
//  HAZARD DRAW
// ════════════════════════════════════════════════════
function drawHazard(h){
  var sx=h.wx-worldX;
  if(sx+h.w<0||sx>GW) return;
  switch(h.type){
    case 'lava': {
      var g=X.createLinearGradient(0,h.y,0,h.y+h.h);
      g.addColorStop(0,'#FF6D00'); g.addColorStop(1,'#DD2C00');
      X.fillStyle=g;
      X.beginPath(); X.moveTo(sx,h.y);
      for(var i=0;i<=h.w;i+=5) X.lineTo(sx+i,h.y+Math.sin((i+frame*3.5)*0.32)*4-2);
      X.lineTo(sx+h.w,h.y+h.h); X.lineTo(sx,h.y+h.h); X.closePath(); X.fill();
      X.fillStyle='rgba(255,200,0,0.25)'; X.fillRect(sx,h.y-6,h.w,7);
      break;
    }
    case 'spike': {
      X.fillStyle='#CFD8DC';
      var cnt=Math.floor(h.w/15);
      for(var i=0;i<cnt;i++){
        X.beginPath(); X.moveTo(sx+i*15,h.y+h.h); X.lineTo(sx+i*15+7.5,h.y); X.lineTo(sx+(i+1)*15,h.y+h.h); X.closePath(); X.fill();
      }
      break;
    }
    case 'water': {
      X.fillStyle='rgba(41,182,246,0.8)';
      X.beginPath(); X.moveTo(sx,h.y);
      for(var i=0;i<=h.w;i+=6) X.lineTo(sx+i,h.y+Math.sin((i+frame*2.2)*0.28)*3);
      X.lineTo(sx+h.w,h.y+h.h); X.lineTo(sx,h.y+h.h); X.closePath(); X.fill();
      X.fillStyle='rgba(255,255,255,0.3)'; X.fillRect(sx+4,h.y+3,h.w-8,4);
      break;
    }
    case 'crab': {
      var cx2=sx+h.w/2,cy=h.y+h.h/2-2;
      var clAnim=Math.sin(frame*0.18)*5;
      X.fillStyle='#EF5350';
      X.beginPath(); X.arc(cx2,cy,13,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc(cx2-18+clAnim,cy-5,8,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc(cx2+18-clAnim,cy-5,8,0,Math.PI*2); X.fill();
      X.strokeStyle='#EF5350'; X.lineWidth=4;
      X.beginPath(); X.moveTo(cx2-13,cy); X.lineTo(cx2-18+clAnim,cy-5); X.stroke();
      X.beginPath(); X.moveTo(cx2+13,cy); X.lineTo(cx2+18-clAnim,cy-5); X.stroke();
      X.fillStyle='white';
      X.beginPath(); X.arc(cx2-5,cy-6,3.5,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc(cx2+5,cy-6,3.5,0,Math.PI*2); X.fill();
      X.fillStyle='#111';
      X.beginPath(); X.arc(cx2-5,cy-6,2,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc(cx2+5,cy-6,2,0,Math.PI*2); X.fill();
      break;
    }
  }
}

//  STAR / GOAL / GROUND
// ════════════════════════════════════════════════════
function drawStar(s){
  if(s.got) return;
  var sx=s.wx-worldX;
  if(sx<-24||sx>GW+24) return;
  s.bob+=0.07;
  var sy=s.y+Math.sin(s.bob)*5;
  X.save(); X.translate(sx,sy);
  var grd=X.createRadialGradient(0,0,0,0,0,20);
  grd.addColorStop(0,'rgba(255,230,0,0.75)'); grd.addColorStop(1,'rgba(255,180,0,0)');
  X.fillStyle=grd; X.fillRect(-20,-20,40,40);
  X.fillStyle='#FFD700';
  X.beginPath();
  for(var i=0;i<5;i++){
    var a1=i*Math.PI*2/5-Math.PI/2, a2=a1+Math.PI/5;
    i===0?X.moveTo(Math.cos(a1)*12,Math.sin(a1)*12):X.lineTo(Math.cos(a1)*12,Math.sin(a1)*12);
    X.lineTo(Math.cos(a2)*5,Math.sin(a2)*5);
  }
  X.closePath(); X.fill();
  X.strokeStyle='#FF8F00'; X.lineWidth=1.2; X.stroke();
  X.restore();
}

function drawGoal(){
  var gx=curLvl.goalX-worldX;
  if(gx<-100||gx>GW+100) return;
  var archH=130;
  X.fillStyle='#FFD700';
  X.fillRect(gx-5,FLOOR-archH,10,archH);
  X.fillRect(gx+50,FLOOR-archH,10,archH);
  X.fillStyle='#FF8F00'; X.fillRect(gx-5,FLOOR-archH-10,65,14);
  var pCols=['#E53935','#1E88E5','#43A047'];
  for(var i=0;i<3;i++){
    X.fillStyle=pCols[i];
    X.beginPath(); X.moveTo(gx+i*22-3,FLOOR-archH-10); X.lineTo(gx+i*22+8,FLOOR-archH-32); X.lineTo(gx+i*22+19,FLOOR-archH-10); X.closePath(); X.fill();
  }
  var fw=Math.sin(frame*0.14)*6;
  X.fillStyle='#E53935';
  X.beginPath(); X.moveTo(gx+27,FLOOR-archH-10);
  X.bezierCurveTo(gx+38,FLOOR-archH-35+fw,gx+50,FLOOR-archH-30-fw,gx+58,FLOOR-archH-34);
  X.lineTo(gx+58,FLOOR-archH-14);
  X.bezierCurveTo(gx+50,FLOOR-archH-10+fw,gx+38,FLOOR-archH-13-fw,gx+27,FLOOR-archH-10);
  X.fill();
  X.font='bold '+Math.floor(GW*0.04)+'px Arial Black,Arial';
  X.fillStyle='#fff'; X.textAlign='center';
  X.fillText('GOAL!',gx+27,FLOOR-archH+28);
}

function drawGround(){
  X.fillStyle=curLvl.gcol||'#5D4037'; X.fillRect(0,FLOOR,GW,GH-FLOOR);
  X.fillStyle=curLvl.gcol2||'#4CAF50'; X.fillRect(0,FLOOR,GW,10);
  X.fillStyle=curLvl.gcol2||'#4CAF50';
  for(var i=0;i<22;i++){
    var gx=((i*68-worldX*0.18)%(GW+80)+GW+80)%(GW+80)-40;
    X.fillRect(gx,FLOOR-6,5,12); X.fillRect(gx+9,FLOOR-4,4,10);
  }
}

// ════════════════════════════════════════════════════
//  PHYSICS
// ════════════════════════════════════════════════════
function update(dt){
  worldX+=RUN_SPD;
  P.vy+=GRAVITY;
  if(holdJump&&P.vy<0){ holdTimer+=dt; if(holdTimer<0.28) P.vy-=0.38; }
  P.y+=P.vy;
  P.onGround=false;
  if(P.y+P.h>=FLOOR){ P.y=FLOOR-P.h; P.vy=0; P.onGround=true; }
  plats.forEach(function(p){
    var psx=p.wx-worldX;
    var pR=psx+p.w, pL=psx;
    var plLeft=P_SCRN_X, plRight=P_SCRN_X+P.w;
    var plBot=P.y+P.h, plTop=P.y;
    if(plRight>pL+4&&plLeft<pR-4){
      if(plBot>=p.y&&plBot<=p.y+p.h+14&&P.vy>=0&&plTop<p.y){
        P.y=p.y-P.h; P.vy=0; P.onGround=true;
        if(p.type==='bounce'){ P.vy=JFORCE*1.35; P.onGround=false; spawnParts(P_SCRN_X+17,P.y+P.h,'#FFD700',7); }
      }
    }
  });
  if(P.onGround) P.legPhase+=0.19;
  if(P.invTimer>0) P.invTimer-=dt;
  if(P.y>GH+60) takeDamage();
  starItems.forEach(function(s){
    if(s.got) return;
    var ssx=s.wx-worldX;
    if(Math.hypot(P_SCRN_X+17-ssx,P.y+P.h/2-s.y)<26){
      s.got=true; STARS++;
      spawnParts(ssx,s.y,'#FFD700',10); spawnParts(ssx,s.y,'#FFF176',6);
    }
  });
  if(P.invTimer<=0){
    hazards.forEach(function(h){
      var hsx=h.wx-worldX;
      if(P_SCRN_X+P.w>hsx+6&&P_SCRN_X<hsx+h.w-6&&P.y+P.h>h.y+4&&P.y<h.y+h.h) takeDamage();
    });
  }
  var goalSx=curLvl.goalX-worldX;
  if(goalSx<P_SCRN_X+P.w&&goalSx+60>P_SCRN_X){
    spawnParts(P_SCRN_X+17,P.y,'#FFD700',20); spawnParts(P_SCRN_X+17,P.y,'#FF4081',15);
    STATE='lvlwin'; lvlWinT=0;
  }
}

function takeDamage(){
  if(P.intTimer>0) return;
  LIVES--; P.intTimer=2.2;
  spawnParts(P_SCRN_X+17,P.y+P.h/2,'#FF1744',16);
  if(LIVES<=0){ STATE='gameover'; goT=0; }
  else{ P.y=FLOOR-P.h-40; P.vy=JFORCE*0.85; worldX=Math.max(0,worldX-160); }
}

//  TITLE SCREEN
// ════════════════════════════════════════════════════
var titleParts=[];
function initTitle(){
  titleParts=[];
  for(var i=0;i<24;i++){
    titleParts.push({
      x:Math.random()*GW, y:GH+20+Math.random()*GH*0.5,
      vx:(Math.random()-0.5)*0.7, vy:-0.6-Math.random()*1.8,
      r:4+Math.random()*9,
      col:['#FF6B35','#FF9F1C','#FFBF00','#FF3F00','#FF1744'][Math.floor(Math.random()*5)],
    });
  }
}

function drawTitle(dt){
  titleTime+=dt;
  var sg=X.createLinearGradient(0,0,0,GH);
  sg.addColorStop(0,'#0D0D2B'); sg.addColorStop(0.5,'#3D1040'); sg.addColorStop(1,'#8B1A1A');
  X.fillStyle=sg; X.fillRect(0,0,GW,GH);
  // Stars
  for(var i=0;i<35;i++){
    var sx2=(i*137+22)%GW, sy2=(i*73+11)%(GH*0.42);
    var br=0.45+0.55*Math.abs(Math.sin(titleTime*1.8+i));
    X.globalAlpha=br; X.fillStyle='#fff'; X.fillRect(sx2,sy2,2,2);
  }
  X.globalAlpha=1;
  // Hills
  X.fillStyle='#1A0A0A';
  X.beginPath(); X.moveTo(0,GH*0.62);
  for(var i=0;i<=GW;i+=3) X.lineTo(i,GH*0.62-Math.abs(Math.sin(i*0.009))*55);
  X.lineTo(GW,GH); X.lineTo(0,GH); X.closePath(); X.fill();
  // Volcano
  X.fillStyle='#200A0A';
  X.beginPath(); X.moveTo(GW/2-160,GH-75); X.lineTo(GW/2-22,GH*0.32);
  X.lineTo(GW/2+22,GH*0.32); X.lineTo(GW/2+160,GH-75); X.closePath(); X.fill();
  // Lava glow
  var lvG=X.createRadialGradient(GW/2,GH*0.32,0,GW/2,GH*0.32,90);
  lvG.addColorStop(0,'rgba(255,'+(80+Math.sin(titleTime*3)*40|0)+',0,0.85)');
  lvG.addColorStop(1,'rgba(255,50,0,0)');
  X.fillStyle=lvG; X.fillRect(GW/2-90,GH*0.14,180,130);
  // Ground
  X.fillStyle='#1A0500'; X.fillRect(0,GH-75,GW,75);
  // Lava particles
  titleParts.forEach(function(p){
    p.x+=p.vx; p.y+=p.vy; if(p.y<-20) p.y=GH+20;
    X.globalAlpha=0.75; X.fillStyle=p.col;
    X.beginPath(); X.arc(p.x,p.y,p.r,0,Math.PI*2); X.fill();
  });
  X.globalAlpha=1;
  // LAVA text
  var logoY=GH*0.22, fs=Math.floor(GW*0.28);
  X.shadowColor='#FF6B00'; X.shadowBlur=30+12*Math.abs(Math.sin(titleTime*2.5));
  var tg=X.createLinearGradient(0,logoY-fs,0,logoY+12);
  tg.addColorStop(0,'#FFEB3B'); tg.addColorStop(0.45,'#FF9800'); tg.addColorStop(1,'#FF3D00');
  X.font='bold '+fs+'px Arial Black,Impact,Arial';
  X.fillStyle=tg; X.textAlign='center'; X.fillText('LAVA',GW/2,logoY);
  X.shadowBlur=0;
  // Drips
  var drips=[GW/2-GW*0.122,GW/2-GW*0.035,GW/2+GW*0.058,GW/2+GW*0.135];
  drips.forEach(function(bx,i){
    var dl=14+9*Math.abs(Math.sin(titleTime*2+i*1.4));
    X.fillStyle='#FF5722';
    X.beginPath(); X.moveTo(bx-4,logoY+4); X.quadraticCurveTo(bx,logoY+dl+6,bx+4,logoY+4); X.closePath(); X.fill();
  });
  // Subtitle
  X.font='bold '+Math.floor(GW*0.052)+'px Arial Black,Arial';
  X.fillStyle='#FFD54F'; X.fillText("ILA'S ADVENTURE",GW/2,logoY+GH*0.085);
  // Ila character
  var charY=Math.floor(GH*0.61);
  X.save();
  X.translate(GW/2,charY); X.rotate(Math.sin(titleTime*1.5)*0.04);
  X.scale(1.35,1.35); X.translate(-GW/2,-charY);
  drawIla(GW/2-17,charY,true,titleTime*2,0);
  X.restore();
  // Level dots
  for(var j=0;j<5;j++){
    X.beginPath(); X.arc(GW/2+(j-2)*26,charY+40,j===0?8:6,0,Math.PI*2);
    X.fillStyle=j===0?'#FF9800':'rgba(255,255,255,0.3)'; X.fill();
  }
  X.font=Math.floor(GW*0.03)+'px Arial';
  X.fillStyle='rgba(255,255,255,0.6)'; X.fillText('5 LEVELS OF FUN!',GW/2,charY+62);
  // Button
  var btnY=GH*0.82, pulse=0.86+0.14*Math.abs(Math.sin(titleTime*3.5));
  var btnW=GW*0.68, btnH=56;
  X.save(); X.translate(GW/2,btnY); X.scale(pulse,pulse);
  rrect(-btnW/2,-btnH/2,btnW,btnH,28);
  var bgg=X.createLinearGradient(0,-btnH/2,0,btnH/2);
  bgg.addColorStop(0,'#FFAB40'); bgg.addColorStop(1,'#E65100');
  X.fillStyle=bgg; X.fill();
  X.strokeStyle='rgba(255,255,255,0.5)'; X.lineWidth=2; X.stroke();
  X.font='bold '+Math.floor(GW*0.062)+'px Arial Black,Arial';
  X.fillStyle='#fff'; X.textAlign='center'; X.fillText('▶  TAP TO PLAY',0,10);
  X.restore();
}

// ════════════════════════════════════════════════════
//  PLAY SCREEN
// ════════════════════════════════════════════════════
var bgFns = { bgJungle:bgJungle, bgSunset:bgSunset, bgDeepJungle:bgDeepJungle, bgPlayground:bgPlayground, bgBeach:bgBeach };
function drawPlay(){
  bgFns[curLvl.bgFn](worldX);
  drawGround(); drawGoal();
  plats.forEach(drawPlat);
  hazards.forEach(drawHazard);
  starItems.forEach(drawStar);
  drawIla(P_SCRN_X,P.y,P.onGround,P.legPhase,P.invTimer);
  drawParts(); drawHUD();
}

// ════════════════════════════════════════════════════
//  PAUSE SCREEN
// ════════════════════════════════════════════════════
function drawPause(){
  drawPlay();
  X.fillStyle='rgba(0,0,0,0.55)'; X.fillRect(0,0,GW,GH);
  X.textAlign='center';
  X.font='bold '+Math.floor(GW*0.11)+'px Arial Black,Arial';
  X.fillStyle='#fff'; X.fillText('PAUSED',GW/2,GH*0.3);
  var btnW=GW*0.68, btnH=54;
  function btn(cy,label,c1,c2){
    X.save(); X.translate(GW/2,cy);
    rrect(-btnW/2,-btnH/2,btnW,btnH,27);
    var g=X.createLinearGradient(0,-btnH/2,0,btnH/2);
    g.addColorStop(0,c1); g.addColorStop(1,c2); X.fillStyle=g; X.fill();
    X.font='bold '+Math.floor(GW*0.055)+'px Arial Black,Arial';
    X.fillStyle='#fff'; X.textAlign='center'; X.fillText(label,0,10); X.restore();
  }
  btn(GH*0.48,'▶  RESUME','#43A047','#1B5E20');
  btn(GH*0.62,'🏠  MENU','#FF5722','#BF360C');
}

// ════════════════════════════════════════════════════
//  LEVEL WIN SCREEN
// ════════════════════════════════════════════════════
function drawLvlWin(dt){
  lvlWinT+=dt;
  drawPlay();
  X.fillStyle='rgba(0,0,0,0.55)'; X.fillRect(0,0,GW,GH);
  if(lvlWinT<2.5&&Math.random()<0.35){
    spawnParts(Math.random()*GW,0,['#FFD700','#FF4081','#4FC3F7','#69F0AE','#FF6D00'][Math.floor(Math.random()*5)],4);
  }
  drawParts();
  X.fillStyle='rgba(255,255,255,0.97)'; rrect(GW*0.08,GH*0.22,GW*0.84,GH*0.56,22); X.fill();
  X.textAlign='center';
  X.font='bold '+Math.floor(GW*0.068)+'px Arial Black,Arial';
  X.fillStyle='#E65100'; X.fillText('LEVEL CLEAR! 🎉',GW/2,GH*0.32);
  X.font='bold '+Math.floor(GW*0.052)+'px Arial';
  X.fillStyle='#444'; X.fillText(curLvl.name,GW/2,GH*0.43);
  X.font=Math.floor(GW*0.1)+'px Arial'; X.fillText('⭐',GW/2-GW*0.12,GH*0.55);
  X.font='bold '+Math.floor(GW*0.065)+'px Arial Black,Arial';
  X.fillStyle='#FF8F00'; X.fillText(STARS+'/'+TOTALS,GW/2+GW*0.08,GH*0.55);
  X.save(); X.scale(0.9,0.9); X.translate(GW*0.2/0.9,(GH*0.66)/0.9);
  drawIla(-17,0,true,lvlWinT*3,0); X.restore();
  if(lvlWinT>1.4){
    var isLast=LEVEL>=LVLS.length-1;
    var btnW=GW*0.72, btnH=54;
    var pulse=0.9+0.1*Math.abs(Math.sin(lvlWinT*5));
    X.save(); X.translate(GW/2,GH*0.82); X.scale(pulse,pulse);
    rrect(-btnW/2,-btnH/2,btnW,btnH,27);
    var g=X.createLinearGradient(0,-btnH/2,0,btnH/2);
    g.addColorStop(0,'#43A047'); g.addColorStop(1,'#1B5E20');
    X.fillStyle=g; X.fill();
    X.font='bold '+Math.floor(GW*0.055)+'px Arial Black,Arial';
    X.fillStyle='#fff'; X.textAlign='center';
    X.fillText(isLast?'🏆  YOU WIN!':'▶  NEXT LEVEL',0,10); X.restore();
  }
}

// ════════════════════════════════════════════════════
//  GAME OVER SCREEN
// ════════════════════════════════════════════════════
function drawGameOver(dt){
  goT+=dt;
  var sg=X.createLinearGradient(0,0,0,GH);
  sg.addColorStop(0,'#1A0000'); sg.addColorStop(1,'#600000');
  X.fillStyle=sg; X.fillRect(0,0,GW,GH);
  for(var i=0;i<8;i++){
    var fx=(i*(GW/7)+frame*1.5)%GW;
    var fh=80+Math.sin(frame*0.12+i)*30;
    var fg=X.createRadialGradient(fx,GH,0,fx,GH-fh,fh);
    fg.addColorStop(0,'rgba(255,100,0,0.85)'); fg.addColorStop(1,'rgba(255,50,0,0)');
    X.fillStyle=fg; X.fillRect(fx-fh,GH-fh,fh*2,fh);
  }
  drawParts();
  X.textAlign='center';
  X.font='bold '+Math.floor(GW*0.14)+'px Arial Black,Impact,Arial';
  X.shadowColor='#FF1744'; X.shadowBlur=24; X.fillStyle='#FF1744';
  X.fillText('OOPS!',GW/2,GH*0.3); X.shadowBlur=0;
  X.font='bold '+Math.floor(GW*0.058)+'px Arial';
  X.fillStyle='#FFE0B2'; X.fillText('The lava got Ila!',GW/2,GH*0.42);
  X.font=Math.floor(GW*0.052)+'px Arial';
  X.fillStyle='#FFB74D'; X.fillText('⭐  Stars: '+STARS,GW/2,GH*0.52);
  if(goT>1.4){
    var btnW=GW*0.72, btnH<54;
    function goBtn(cy,label,c1,c2){
      var pulse=0.9+0.1*Math.abs(Math.sin(goT*5));
      X.save(); X.translate(GW/2,cy); X.scale(pulse,pulse);
      rrect(-btnW/2,-btnH/2,btnW,btnH,27);
      var g=X.createLinearGradient(0,-btnH/2,0,btnH/2);
      g.addColorStop(0,c1); g.addColorStop(1,c2); X.fillStyle=g; X.fill();
      X.font='bold '+Math.floor(GW*0.055)+'px Arial Black,Arial';
      X.fillStyle='#fff'; X.textAlign='center'; X.fillText(label,0,10); X.restore();
    }
    goBtn(GH*0.68,'🔄  TRY AGAIN','#FF5722','#BF360C');
    goBtn(GH*0.82,'🏠  MAIN MENU','#37474F','#1C313A');
  }
}

// ════════════════════════════════════════════════════
//  WIN SCREEN
// ════════════════════════════════════════════════════
function drawWin(dt){
  winT+=dt;
  var sg=X.createLinearGradient(0,0,0,GH);
  sg.addColorStop(0,'#1A237E'); sg.addColorStop(0.45,'#E65100'); sg.addColorStop(1,'#FFD54F');
  X.fillStyle=sg; X.fillRect(0,0,GW,GH);
  X.fillStyle='#F9A825'; X.fillRect(0,GH*0.62,GW,GH*0.38);
  drawSandcastle(GW/2+80,GH*0.64);
  X.save(); X.scale(1.4,1.4); X.translate(GW*0.18/1.4,(GH*0.62)/1.4);
  drawIla(-17,0,true,winT*4,0); X.restore();
  if(Math.random()<0.45){
    spawnParts(Math.random()*GW,-10,['#FFD700','#FF4081','#4FC3F7','#69F0AE','#FF6D00','#fff'][Math.floor(Math.random()*6)],3);
  }
  parts.forEach(function(p){ p.vy=Math.abs(p.vy)*0.4+0.8; });
  drawParts();
  X.textAlign='center';
  var wg=X.createLinearGradient(0,GH*0.1,0,GH*0.28);
  wg.addColorStop(0,'#FFD700'); wg.addColorStop(1,'#FF6D00');
  X.font='bold '+Math.floor(GW*0.14)+'px Arial Black,Impact,Arial';
  X.shadowColor='#FF8F00'; X.shadowBlur=22;
  X.fillStyle=wg; X.fillText('YOU WIN!',GW/2,GH*0.24); X.shadowBlur=0;
  X.font='bold '+Math.floor(GW*0.052)+'px Arial';
  X.fillStyle='#fff'; X.fillText('Ila reached the beach! 🏖',GW/2,GH*0.36);
  X.font=Math.floor(GW*0.065)+'px Arial';
  X.fillText('⭐ '+STARS+' Stars Collected!',GW/2,GH*0.46);
  if(winT>2){
    var btnW=GW*0.75, btnH=56;
    var pulse=0.9+0.1*Math.abs(Math.sin(winT*5));
    X.save(); X.translate(GW/2,GH*0.88); X.scale(pulse,pulse);
    rrect(-btnW/2,-btnH/2,btnW,btnH,28);
    var g=X.createLinearGradient(0,-btnH/2,0,btnH/2);
    g.addColorStop(0,'#FFAB40'); g.addColorStop(1,'#E65100');
    X.fillStyle=g; X.fill();
    X.font='bold '+Math.floor(GW*0.055)+'px Arial Black,Arial';
    X.fillStyle='#fff'; X.textAlign='center'; X.fillText('🏠  PLAY AGAIN',0,10); X.restore();
  }
}

// ════════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════════
function handleTap(tx,ty){
  switch(STATE){
    case 'title':
      LEVEL=0; LIVES=3; STARS=0; loadLevel(0); STATE='play'; break;
    case 'play':
      if(tx>GW-52&&ty<46){ STATE='pause'; return; }
      if(P.onGround){ P.vy=JFORCE; P.onGround=false; holdJump=true; holdTimer=0; spawnParts(P_SCRN_X+17,P.y+P.h,'#fff',5); }
      break;
    case 'pause':
      if(ty>GH*0.42&&ty<GH*0.56) STATE='play';
      else if(ty>GH*0.56&&ty<GH*0.7){ STATE='title'; initTitle(); }
      break;
    case 'lvlwin':
      if(lvlWinT>1.4){
        LEVEL++;
        if(LEVEL>=LVLS.length){ STATE='win'; winT=0; }
        else{ loadLevel(LEVEL); STATE='play'; }
      }
      break;
    case 'gameover':
      if(goT>1.4){
        if(ty<GH*0.76){ LIVES=3; STARS=0; loadLevel(LEVEL); STATE='play'; goT=0; }
        else{ STATE='title'; goT=0; initTitle(); }
      }
      break;
    case 'win':
      if(winT>2){ LEVEL=0; LIVES=3; STARS=0; loadLevel(0); STATE='title'; winT=0; initTitle(); }
      break;
  }
}
function handleRelease(){ holdJump=false; holdTimer=0; }

C.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.touches[0], r=C.getBoundingClientRect();
  handleTap(t.clientX-r.left,t.clientY-r.top);
},{passive:false});
C.addEventListener('touchend',function(e){ e.preventDefault(); handleRelease(); },{passive:false});
C.addEventListener('mousedown',function(e){ var r=C.getBoundingClientRect(); handleTap(e.clientX-r.left,e.clientY-r.top); });
C.addEventListener('mouseup',handleRelease);
document.addEventListener('touchmove',function(e){ e.preventDefault(); },{passive:false});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'){ handleTap(GW/2,GH/2); holdJump=true; holdTimer=0; e.preventDefault(); }
});
document.addEventListener('keyup',handleRelease);

// ════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════
var lastTs=0;
function loop(ts){
  var dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts; frame++;
  X.clearRect(0,0,GW,GH);
  switch(STATE){
    case 'title':
      titleParts.forEach(function(p){ p.x+=p.vx; p.y+=p.vy; if(p.y<-20) p.y=GH+20; });
      drawTitle(dt); break;
    case 'play': update(dt); tickParts(dt); drawPlay(); break;
    case 'pause': drawPause(); break;
    case 'lvlwin': tickParts(dt); drawLvlWin(dt); break;
    case 'gameover': tickParts(dt); drawGameOver(dt); break;
    case 'win': tickParts(dt); drawWin(dt); break;
  }
  requestAnimationFrame(loop);
}

initTitle();
requestAnimationFrame(loop);
</script>
